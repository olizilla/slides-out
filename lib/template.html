<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}}</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #fafafa;
      color: #222;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
    }
    .slide {
      background: white;
      border: 1px solid #eaeaea;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 48px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #eee;
      display: block;
      margin: 0 auto;
    }
    .notes {
      margin-top: 24px;
      white-space: pre-wrap;
    }
    hr {
      border: 0;
      border-top: 1px solid #eee;
      margin: 48px 0;
    }
    footer {
      font-size: 0.85em;
      color: #666;
      text-align: center;
      margin-top: 64px;
      border-top: 1px solid #eee;
      padding-top: 24px;
    }
    footer a {
      color: #333;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>{{TITLE}}</h1>
{{SLIDES}}
  <footer>
    <p>Original Deck:
      <a href="https://docs.google.com/presentation/d/{{PRESENTATION_ID}}/edit" target="_blank">docs.google.com/presentation/d/{{PRESENTATION_ID}}</a>
    </p>
    <p>Published: {{PUB_DATE}}</p>
  </footer>
</body>
</html>
